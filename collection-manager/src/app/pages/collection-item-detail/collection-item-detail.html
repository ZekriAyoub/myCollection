<form (submit)="submit($event)">
  <div class="form-field">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" [formControl]="nameFormControl">
    @if (nameFormControl.invalid && (nameFormControl.touched || nameFormControl.dirty)){
      <div class="error">This field is required.</div>
    }
  </div>
  <button type="submit" [disabled]="nameFormControl.invalid">Submit</button><br>
</form>
