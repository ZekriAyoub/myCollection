<header id="collection-header">
  <h1>My Collection</h1>
  <div>
    <app-search-bar
      (searchButtonClicked)="incrementCount()"
      [(search)]="searchText"
    >
    </app-search-bar>
    Clicked count : {{count}}
    <br>
    Search Text : {{searchText}}
  </div>
</header>
<section class="collection-grid">
  <app-collection-item-card [item]="itemList[selectedItemIndex()]"></app-collection-item-card>
</section>
<button (click)="incrementIndex()">Toggle</button>
