<header id="collection-header">
  <h1>My Collection</h1>
  <div>
    <app-search-bar
      [(search)]="searchText"
    >
    </app-search-bar>
  </div>
</header>
<section class="collection-grid">
  @for(item of collectionItems(); track item.name){
    <app-collection-item-card
      [item]="item"
    >
    </app-collection-item-card>
  }
</section>
