<article class="collection-item-card">
  <span class="rarity-ship">{{item().rarity}}</span>

  <figure class="item-image">
    <img [src]="item().image" alt="collection-item">
  </figure>

  <header class="item-header">
    <h2 class="item-name">
      {{item().name}}
    </h2>
  </header>

  <p class="item-description">
    {{item().description}}
  </p>

  <footer>
    <p class="item-price">{{item().price}}$</p>
  </footer>
</article>
